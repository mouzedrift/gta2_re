name: CI

on:
  push:
    branches: [ci-tests]
  pull_request:
    branches: [ci-tests]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository recursively
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Install dependencies on Linux
      if: runner.os == 'Linux'
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y xvfb wine32

    - name: Install dependencies on Windows
      if: runner.os == 'Windows'
      run: |
        echo No special dependencies for Windows in this example

    - name: Build on Linux
      if: runner.os == 'Linux'
      run: |
        python3 setup.py
        rm -Rf ./wine
        WINEPREFIX=~/.wine32 WINEARCH=win32 xvfb-run wineboot
        WINEPREFIX=~/.wine32 WINEARCH=win32 xvfb-run wine cmd /c build.bat

    - name: Build on Windows
      if: runner.os == 'Windows'
      run: |
        echo Perform Windows build steps here
