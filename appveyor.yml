version: 1.0.{build}

environment:
  matrix:
    - job_name: Windows
      APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2017

    - job_name: Linux
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu

platform:
 - x86

test: off

for:
# ======================================
#      Windows
# ======================================
-
  matrix:
    only:
    - job_name: Windows

  build_script:
   - python setup.py
   - build.bat

  install:
   - git submodule update --init --recursive


 # ======================================
#      Linux
# ======================================
-
  matrix:
    only:
    - job_name: Linux
  
  install:
   - sudo apt update
   - sudo dpkg --add-architecture i386
   - sudo apt-get install -y wine32
   - git submodule update --init --recursive

  build_script:
   - python setup.py
   - rm -Rf ./wine
   - export WINEPREFIX=~/.wine32
   - export WINEARCH=win32 
   - wine wineboot
   - ls
   - wine cmd /c build.bat
